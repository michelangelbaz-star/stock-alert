name: Stock Alert Monitor

on:
  schedule:
    # Ogni 5 minuti, lunedì–venerdì, 7:00–16:00 UTC (= 9:00–18:00 ora di Roma)
    - cron: '*/5 7-15 * * 1-5'
  workflow_dispatch:  # Permette avvio manuale dalla pagina GitHub

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ripristina stato precedente
        uses: actions/cache/restore@v4
        with:
          path: stock_state.json
          key: stock-state-${{ github.run_number }}
          restore-keys: stock-state-

      - name: Installa Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa librerie
        run: pip install yfinance feedparser requests pytz

      - name: Esegui controllo prezzi
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python stock_alert_gha.py

      - name: Salva stato aggiornato
        uses: actions/cache/save@v4
        if: always()
        with:
          path: stock_state.json
          key: stock-state-${{ github.run_number }}
