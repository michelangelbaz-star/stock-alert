name: Stock Alert Monitor
on:
  schedule:
    - cron: '*/5 7-15 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ripristina stato precedente
        uses: actions/cache@v4
        with:
          path: stock_state.json
          key: stock-state-${{ github.run_id }}
          restore-keys: stock-state

      - name: Installa Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa librerie
        run: pip install yfinance feedparser requests pytz

      - name: Esegui controllo prezzi
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python stock_alert_gha.py

      - name: Salva stato aggiornato
        uses: actions/cache@v4
        with:
          path: stock_state.json
          key: stock-state-${{ github.run_id }}
